server {
	listen 80;
	server_name localhost;

	root /var/www/html;
	index index.php index.html;

	error_page 404 /404.html;
    location = /404.html {
        root /var/www/html/;
        internal;
    }

  location ~* /vendor/ {
    deny all;
    return 403;
  }

	# Route all /project1/* requests through the PHP front controller,
	# explicitly setting SCRIPT_NAME so the router can detect the /project1 base path.
	location /project1/ {
		try_files $uri $uri/ @project1_php;
	}

	location @project1_php {
		fastcgi_pass php:9000;
		include fastcgi_params;
		fastcgi_param SCRIPT_FILENAME /var/www/html/index.php;
		fastcgi_param SCRIPT_NAME     /project1/index.php;
	}

	location / {
		try_files $uri $uri/ /index.php?$query_string;
	}

	location ~ \.php$ {
		include fastcgi_params;
		fastcgi_pass php:9000;
		fastcgi_index index.php;
		fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
	}

	location ~ /\.ht {
		deny all;
	}
}